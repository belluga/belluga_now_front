include: package:flutter_lints/flutter.yaml

analyzer:
  plugins:
    - custom_lint
  exclude:
    - lib/application/configurations/belluga_nattive_icons.dart
    - "**/*.mocks.dart"
    - tool/belluga_custom_lint/test_fixtures/**
    - "**/test_fixtures/**"

custom_lint:
  debug: true
  verbose: true
  rules:
    - domain_primitive_field_forbidden
    - dto_mapper_pass_through_forbidden

linter:
  rules:
    no_leading_underscores_for_local_identifiers: false
    always_declare_return_types: true
