include: package:flutter_lints/flutter.yaml

analyzer:
  plugins:
    - custom_lint
  exclude:
    - lib/application/configurations/belluga_nattive_icons.dart
    - "**/*.mocks.dart"
    - tool/belluga_custom_lint/test_fixtures/**
    - "**/test_fixtures/**"

custom_lint:
  rules:
    - domain_primitive_field_forbidden: false
    - repository_raw_payload_map_forbidden: false
    - repository_raw_transport_typing_forbidden: false

linter:
  rules:
    no_leading_underscores_for_local_identifiers: false
    always_declare_return_types: true
