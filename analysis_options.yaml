include: package:flutter_lints/flutter.yaml

plugins:
  belluga_analysis_plugin:
    path: tool/belluga_analysis_plugin

analyzer:
  exclude:
    - lib/application/configurations/belluga_nattive_icons.dart
    - "**/*.mocks.dart"
    - tool/belluga_custom_lint/test_fixtures/**
    - tool/belluga_analysis_plugin/**
    - "**/test_fixtures/**"

linter:
  rules:
    no_leading_underscores_for_local_identifiers: false
    always_declare_return_types: true
